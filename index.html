          <div class="row"><!--اختيار مطارالذهاب  -->

              <option selected value="5">random</option>
            </select>
          </div>
          </div>


          <div class="row"><!--تارخ الذهاب والاياب-->
            <div class="col m-1 ">
              
                <label for="go-date">the date of go</label>
                <input  type="date" name="Go date" id="go-date">
                <label for="re-date">Return date</label>
                <input type="date" name="return date" id="re-date">

          </div>

          <div class="row"><!--الدرجة الاقتصادية   -->

              <input type="radio" class="btn-check" name="Category" id="Category-2" autocomplete="off">

              <input type="radio" class="btn-check" name="Category" id="Category-3" autocomplete="off">
              <label class="btn" for="Category-3">first class</label>
            </div>
            
          </div>

          <div class="row"><!-- عدد المسافرون -->
            <div class="col">              
                <label class="" for="num-tr" >number of trav</label>
                <input type="number" max="6" min="1" value="1" id="num-tr" name="number-tr">              
            </div>
            <div class="col">
              <input type="checkbox" class="btn-check" name="options-stop" id="Without-st" autocomplete="off" >

   <div class="container mt-5 mb-5 border">
    <div class="row">
      <div class="col bg-secondary text-center">
        <p>Personal information</p>
        <form action="">

      </div>
      <div class="row"><!-- الاسم الثلاثي -->
        <div class="col-4 mt-1">
          <label for="fname" id="fname">First name</label>
          <input class="bg-secondary" type="text" id="fname" required>
        </div>
        <div class="col-4 mt-1"> 
          <label for="mdname" id="mname">Midll name</label>
          <input class="bg-secondary" type="text" id="mdname" required>
        </div>
        <div class="col-4 mt-1"> 
          <label for="laname" id="lname">last name</label>
          <input class="bg-secondary" type="text" id="laname" required>
        </div>
      </div>
      <div class="row w">
        <div class="col-4 mt-1 "><!--  بطاقة الائتمان-->
          <label for="credit" >credit card</label>
          <input class="bg-secondary" type="number" maxlength="16" id="credit" required>
        </div>
        <div class="col-4 mt-1"><!-- رقم الهاتف -->
          <label for="phonenum" >phone number</label>
          <input class="bg-secondary" type="number" maxlength="10" id="phonenum" required>
        </div>
        <div class="col-4 mt-1"><!-- الرقم الوطني  -->
          <label for="nationnum" >nation number</label>
          <input class="bg-secondary" type="number" maxlength="11" id="nationnum" required>
        </div>
        
      </div>
      <div class="row">
        <div class="col-4 mt-1">
          <label for="from">from</label> <!-- من الدولة كذا -->
          <input class="bg-secondary" type="text" id="from" required>
        </div>
        <div class="col-4 mt-1">
          <label for="to">to</label><!-- الى الدولة كذا -->
          <input class="bg-secondary" type="text" id="to" required>
        </div>
        <div class="col-4 mt-1"><label for="cardsnum">number of cards</label><!-- عدد بطاقات السفر  -->
        <input class="bg-secondary" type="number" id="cardsnum" min="1" max="6" required></div>
      </div>
      <div class="row mt-5 mb-5">
        <div class="col-6 "><button type="submit" style="width:100%;" >confirm</button></div>
        <div class="col-6"><button type="reset" style="width:100%;">cancel</button></div>
      </div>
      </form>
